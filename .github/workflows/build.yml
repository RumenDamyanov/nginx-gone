name: Build

# NOTE: These CI builds are for testing/validation only.
# For production packages, use the official OBS (openSUSE Build Service) builds:
# https://build.opensuse.org/package/show/home:rumenx/nginx-gone

permissions:
  contents: read

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    env:
      NGINX_VERSION: "1.28.0"
      TARGET_ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Build module (${{ matrix.arch }})
        run: |
          set -euxo pipefail
          docker run --platform=linux/${TARGET_ARCH} --rm -v "$PWD":/workspace -w /workspace ubuntu:25.04 /bin/bash -c "\
            set -euxo pipefail; \
            apt-get update; \
            DEBIAN_FRONTEND=noninteractive apt-get install -y build-essential wget libpcre2-dev zlib1g-dev ca-certificates file; \
            mkdir -p build/${NGINX_VERSION}; cd build/${NGINX_VERSION}; \
            wget -nv https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz; \
            tar xzf nginx-${NGINX_VERSION}.tar.gz; cd nginx-${NGINX_VERSION}; \
            ./configure --add-dynamic-module=/workspace/src --with-compat; \
            make modules -j\$(nproc); \
            file objs/ngx_http_gone_module.so; \
            echo '${TARGET_ARCH} build successful'; \
          "
