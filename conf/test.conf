# nginx-gone Test Configuration
#
# Tests URI matching and 410 Gone responses.
#
# Usage:
#   1. Build the module (see scripts/local-build.sh)
#   2. Update load_module path below
#   3. Run: nginx -t -c /path/to/test.conf
#   4. Start: nginx -c /path/to/test.conf
#   5. Test:
#      curl -I http://localhost:8410/old-page.html     → 410
#      curl -I http://localhost:8410/existing-page.html → 200/404

# Adjust path:
load_module /usr/lib64/nginx/modules/ngx_http_gone_module.so;

events {
    worker_connections 1024;
}

http {
    # Point to test fixture map file
    # Adjust path to your actual location:
    gone_map_file /etc/nginx/maps/gone.map;

    server {
        listen 8410;
        server_name localhost;

        access_log /tmp/nginx-gone-access.log;
        error_log /tmp/nginx-gone-error.log debug;

        # Enable gone checking
        gone on;

        # Default: return 200 for non-gone URIs
        location / {
            default_type text/plain;
            return 200 "OK - not gone\n";
        }

        # Disable gone for this location
        location /bypass {
            gone off;
            default_type text/plain;
            return 200 "OK - gone disabled\n";
        }
    }
}
