# nginx-gone Configuration Example
#
# Version: 0.1.0
#
# Available Directives:
#
#   gone on|off
#     - Enable/disable gone URI checking
#     - Context: http, server, location
#     - Default: off
#
#   gone_map_file path
#     - Path to the URI map file (read once at config load)
#     - Context: http only
#     - Supports absolute and relative paths
#
#   gone_use_request_uri on|off
#     - Match against $request_uri instead of $uri
#     - Context: http only
#     - Default: off
#


# =============================================================================
# Example 1: Basic Setup
# =============================================================================
#
# Return 410 Gone for removed pages listed in the map file.
# Non-matching requests pass through to normal processing.

load_module modules/ngx_http_gone_module.so;

http {
    # Load the gone URI map (read once at startup / reload)
    gone_map_file /etc/nginx/maps/gone.map;

    server {
        listen 80;
        server_name example.com;

        # Enable gone checking for this server
        gone on;

        location / {
            root /var/www/html;
            try_files $uri $uri/ =404;
        }

        # Disable gone checking for the API
        location /api/ {
            gone off;
            proxy_pass http://backend;
        }
    }

    server {
        listen 80;
        server_name other.com;

        # Gone checking is off by default — these requests are unaffected
        location / {
            root /var/www/other;
        }
    }
}


# =============================================================================
# Example 2: With Request URI Matching
# =============================================================================
#
# Match against the original request URI (including query string)
# instead of the normalized $uri.

# load_module modules/ngx_http_gone_module.so;
#
# http {
#     gone_map_file /etc/nginx/maps/gone.map;
#     gone_use_request_uri on;
#
#     server {
#         listen 80;
#         server_name example.com;
#         gone on;
#
#         location / {
#             root /var/www/html;
#         }
#     }
# }


# =============================================================================
# Example 3: Per-Server Control
# =============================================================================
#
# Enable gone checking only on specific virtual hosts.

# load_module modules/ngx_http_gone_module.so;
#
# http {
#     gone_map_file /etc/nginx/maps/gone.map;
#
#     # Legacy site — many old URLs to handle
#     server {
#         listen 80;
#         server_name legacy.example.com;
#         gone on;
#
#         location / {
#             root /var/www/legacy;
#         }
#     }
#
#     # New site — no 410s needed
#     server {
#         listen 80;
#         server_name new.example.com;
#         # gone is off by default
#
#         location / {
#             root /var/www/new;
#         }
#     }
# }


# =============================================================================
# Example gone.map File
# =============================================================================
#
# Place this content in /etc/nginx/maps/gone.map:
#
# # Old blog posts (removed permanently)
# /blog/2020/deleted-post 1
# /blog/2019/old-article 1
#
# # Discontinued products
# /products/old-widget 1
# /products/legacy-gadget 1
#
# # Removed images
# /images/broken-banner.jpg 1
#
# # Regex: everything under /deprecated/
# ~^/deprecated/ 1
#
# # Case-insensitive regex: old PHP pages
# ~*^/old-(.*)\.php$ 1
